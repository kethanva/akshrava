groups:
  - name: akshrava-availability
    rules:
      - alert: AkshravaControlPlaneDown
        expr: up{job="akshrava-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Akshrava control plane is not scrapeable"
      - alert: AkshravaGpuWorkerDown
        expr: up{job="akshrava-gpu-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Akshrava GPU worker is not scrapeable"
      - alert: AkshravaLateResults
        expr: increase(akshrava_late_suppressed_total[10m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Inference is exceeding the speaking freshness budget"
      - alert: AkshravaSessionAdmissionSaturated
        expr: increase(akshrava_session_admission_rejected_total[10m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Authenticated walking sessions are being rejected because fleet capacity is exhausted"
      - alert: AkshravaFrameIngressAgeHigh
        expr: histogram_quantile(0.95, rate(akshrava_frame_age_milliseconds_bucket[10m])) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Phone capture-to-API frame age p95 is above the freshness budget"
