name: Android compatibility matrix

on:
  pull_request:

jobs:
  api-smoke:
    name: Android API ${{ matrix.api }} smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - api: 26
            arch: x86
          - api: 27
            arch: x86
          - api: 28
            arch: x86_64
          - api: 29
            arch: x86_64
          - api: 30
            arch: x86_64
          - api: 31
            arch: x86_64
          - api: 32
            arch: x86_64
          - api: 33
            arch: x86_64
          - api: 34
            arch: x86_64
          - api: 35
            arch: x86_64
          - api: 36
            arch: x86_64
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: ./gradlew --no-daemon :app:assembleDebug :app:assembleDebugAndroidTest
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api }}
          target: default
          arch: ${{ matrix.arch }}
          profile: Nexus 6
          disable-animations: true
          script: cd android && ./gradlew --no-daemon :app:connectedDebugAndroidTest
