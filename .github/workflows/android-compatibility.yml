name: Android compatibility matrix

on:
  push:
  pull_request:

jobs:
  api-smoke:
    name: Android API ${{ matrix.api }} smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api: [28, 29, 30, 31, 32, 33, 34, 35, 36]
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: ./gradlew --no-daemon :app:assembleDebug :app:assembleDebugAndroidTest
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api }}
          target: default
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          script: cd android && ./gradlew --no-daemon :app:connectedDebugAndroidTest
