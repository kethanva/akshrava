name: Android compatibility matrix

on:
  pull_request:

concurrency:
  group: android-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-apks:
    name: Build instrumentation APKs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: ./gradlew --no-daemon :app:assembleDebug :app:assembleDebugAndroidTest
      - uses: actions/upload-artifact@v4
        with:
          name: pr-instrumentation-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          retention-days: 7
          if-no-files-found: error

  api-smoke:
    name: Android API ${{ matrix.api }} smoke
    runs-on: ubuntu-latest
    needs: build-test-apks
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - api: 26
            arch: x86
          - api: 27
            arch: x86
          - api: 28
            arch: x86_64
          - api: 29
            arch: x86_64
          - api: 30
            arch: x86_64
          - api: 31
            arch: x86_64
          - api: 32
            arch: x86_64
          - api: 33
            arch: x86_64
          - api: 34
            arch: x86_64
          - api: 35
            arch: x86_64
          - api: 36
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pr-instrumentation-apks
          path: instrumentation-apks
      - uses: reactivecircus/android-emulator-runner@v2
        id: primary_emulator
        continue-on-error: true
        with:
          api-level: ${{ matrix.api }}
          target: default
          arch: ${{ matrix.arch }}
          profile: Nexus 6
          emulator-boot-timeout: 1200
          disable-animations: false
          pre-emulator-launch-script: sudo chmod 666 /dev/kvm
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./scripts/run_android_instrumentation.sh instrumentation-apks/debug/app-debug.apk instrumentation-apks/androidTest/debug/app-debug-androidTest.apk android-test-results/api-${{ matrix.api }}
      - uses: reactivecircus/android-emulator-runner@v2
        if: steps.primary_emulator.outcome == 'failure'
        env:
          ANDROID_SERIAL: emulator-5556
        with:
          api-level: ${{ matrix.api }}
          target: default
          arch: ${{ matrix.arch }}
          profile: Nexus 6
          avd-name: retry-${{ matrix.api }}
          emulator-port: 5556
          emulator-boot-timeout: 1200
          disable-animations: false
          pre-emulator-launch-script: sudo chmod 666 /dev/kvm
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./scripts/run_android_instrumentation.sh instrumentation-apks/debug/app-debug.apk instrumentation-apks/androidTest/debug/app-debug-androidTest.apk android-test-results/api-${{ matrix.api }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-test-results-api-${{ matrix.api }}
          path: android-test-results/api-${{ matrix.api }}/
          retention-days: 7
          if-no-files-found: warn
