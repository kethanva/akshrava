name: Android build & test pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Assemble debug AndroidTest APK
        run: ./gradlew --no-daemon :app:assembleDebugAndroidTest

      - name: Assemble release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: akshrava-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload debug AndroidTest APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: akshrava-debug-androidTest-apk
          path: android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          retention-days: 7
          if-no-files-found: error

      # Without ANDROID_KEYSTORE_* secrets, AGP emits app-release-unsigned.apk.
      # With secrets present (optional on main), it emits app-release.apk.
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: akshrava-release-apk
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
          if-no-files-found: error

  test-matrix:
    name: Android API ${{ matrix.api }} smoke
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # API 26/27 only publish 32-bit default images on x86.
          - api: 26
            arch: x86
          - api: 27
            arch: x86
          - api: 28
            arch: x86_64
          - api: 29
            arch: x86_64
          - api: 30
            arch: x86_64
          - api: 31
            arch: x86_64
          - api: 32
            arch: x86_64
          - api: 33
            arch: x86_64
          - api: 34
            arch: x86_64
          - api: 35
            arch: x86_64
          - api: 36
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      # Rebuild in-job: connectedDebugAndroidTest installs from Gradle outputs,
      # so downloading prebuilt APKs would be unused and misleading.
      - name: Assemble APKs for instrumented tests
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Run instrumented tests on API ${{ matrix.api }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api }}
          target: default
          arch: ${{ matrix.arch }}
          profile: Nexus 6
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect
          script: cd android && ./gradlew --no-daemon :app:connectedDebugAndroidTest

      - name: Upload test results (API ${{ matrix.api }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-api-${{ matrix.api }}
          path: android/app/build/reports/
          retention-days: 7
          if-no-files-found: ignore
