name: Publish release artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-compatibility:
    name: Android API ${{ matrix.api }} release smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - api: 26
            arch: x86
          - api: 27
            arch: x86
          - api: 28
            arch: x86_64
          - api: 29
            arch: x86_64
          - api: 30
            arch: x86_64
          - api: 31
            arch: x86_64
          - api: 32
            arch: x86_64
          - api: 33
            arch: x86_64
          - api: 34
            arch: x86_64
          - api: 35
            arch: x86_64
          - api: 36
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: cd android && ./gradlew --no-daemon :app:assembleDebug :app:assembleDebugAndroidTest
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api }}
          target: default
          arch: ${{ matrix.arch }}
          profile: Nexus 6
          disable-animations: true
          pre-emulator-launch-script: sudo chmod 666 /dev/kvm
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect
          script: cd android && ./gradlew --no-daemon :app:connectedDebugAndroidTest

  configuration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false
      - run: ./scripts/validate_compose_config.sh
      - run: ./scripts/test_cloud_preflight.sh
      - run: ./scripts/gcp_preflight.sh --ci

  publish:
    runs-on: ubuntu-latest
    needs: [android-compatibility, configuration]
    env:
      AKSHRAVA_ENV: development
      DEV_AUTH_BYPASS: "true"
      DETECTOR: noop
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Verify release tag matches artifacts
        run: python scripts/check_release_version.py "$GITHUB_REF_NAME"
      - name: Verify backend and build wheel
        working-directory: backend
        run: |
          python -m pip install --upgrade 'pip>=26.1.2' 'setuptools>=83' '.[dev]' build pip-audit
          pytest -q
          ruff check akshrava_backend tests
          python -m pip check
          pip-audit
          python -m build
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Materialize release signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore
      - name: Build Android artifact
        working-directory: android
        env:
          REQUIRE_RELEASE_SIGNING: "true"
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
          ./gradlew --no-daemon :app:testDebugUnitTest :app:assembleRelease
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, subprocess
          tag = os.environ["GITHUB_REF_NAME"]
          commit = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          manifest = {
              "tag": tag,
              "commit": commit,
              "database_schema_revision": "20260721_01",
              "detector_default": "noop",
              "yolo_weights_sha256": os.environ.get("YOLO_WEIGHTS_SHA256", ""),
              "artifacts": [
                  "backend wheel under backend/dist/",
                  "android/app/build/outputs/apk/release/app-release.apk",
              ],
              "notes": "Model weights are not published here; pin SHA in cloud/gcp/terraform.tfvars before detector=remote.",
          }
          with open("release-manifest.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, indent=2)
              handle.write("\n")
          PY
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" --clobber \
              backend/dist/* \
              android/app/build/outputs/apk/release/app-release.apk \
              release-manifest.json
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Akshrava $GITHUB_REF_NAME" \
              --generate-notes \
              backend/dist/* \
              android/app/build/outputs/apk/release/app-release.apk \
              release-manifest.json
          fi
