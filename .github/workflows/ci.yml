name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      AKSHRAVA_ENV: development
      DEV_AUTH_BYPASS: "true"
      DETECTOR: noop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install '.[dev]' pip-audit
      - run: ../scripts/verify_phases.sh
      - run: DATABASE_URL=sqlite:///./migration-check.db alembic upgrade head
      - run: python -m pip check
      - run: pip-audit

  release-gate:
    runs-on: ubuntu-latest
    needs: [backend, deployment-config, gcp-iac, android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - run: echo "Automated checks passed. Human safety, model, device and supervised-trial gates remain mandatory."

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: POSTGRES_PASSWORD=test-password-with-at-least-32-characters JWT_SECRET=test-secret-with-at-least-32-characters DOMAIN=example.org GRAFANA_PASSWORD=test-grafana-password-with-at-least-32-chars REDIS_PASSWORD=test-redis-password-with-at-least-32-chars docker compose -f infra/docker-compose.yml --profile control-plane --profile edge --profile monitoring config --quiet
      - run: POSTGRES_PASSWORD=test-password-with-at-least-32-characters JWT_SECRET=test-secret-with-at-least-32-characters DOMAIN=example.org GRAFANA_PASSWORD=test-grafana-password-with-at-least-32-chars REDIS_PASSWORD=test-redis-password-with-at-least-32-chars docker compose -f infra/docker-compose.yml --profile gpu-worker config --quiet
      - run: ./scripts/test_cloud_preflight.sh
      - run: docker build --build-arg INSTALL_YOLO=false -t akshrava-api-ci backend

  gcp-iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false
      - run: ./scripts/gcp_preflight.sh

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: ./gradlew --no-daemon :app:testDebugUnitTest :app:assembleDebug
