name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB: akshrava_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      AKSHRAVA_ENV: development
      DEV_AUTH_BYPASS: "true"
      DETECTOR: noop
      DATABASE_URL: "postgresql+asyncpg://postgres:${{ github.run_id }}-${{ github.run_attempt }}@localhost:5432/akshrava_ci"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Create the verified backend environment
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade 'pip>=26.1.2' 'setuptools>=83'
          .venv/bin/python -m pip install '.[dev]' pip-audit
      # Apply migrations on a clean DB before tests so pytest does not create tables
      # via SQLAlchemy metadata and then leave alembic unable to upgrade.
      - run: .venv/bin/alembic upgrade head
      - run: ../scripts/verify_phases.sh
      - run: .venv/bin/python -m pip check
      - run: .venv/bin/pip-audit

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/validate_compose_config.sh
      - run: ./scripts/test_cloud_preflight.sh
      - run: docker build --build-arg INSTALL_YOLO=false -t akshrava-api-ci backend

  gcp-iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false
      - run: ./scripts/gcp_preflight.sh --ci

  android:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: ./gradlew --no-daemon :app:testDebugUnitTest
