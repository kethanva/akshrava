global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

# Alerts (control-plane down, GPU worker down, silent-device / late-results, admission saturation)
# must reach a human, not just render in the Prometheus UI. §3.4 makes a device that goes silent
# mid-session an operator action item. The Alertmanager routes them to the configured receiver.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'akshrava-api'
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_scrape_token
    static_configs:
      - targets: ['api:8000']

  # A GPU worker normally lives on another private host. Add its private endpoint to
  # prometheus-targets/gpu-workers.json; file SD permits reloads without baking addresses into
  # source control or exposing the worker on the public internet.
  - job_name: 'akshrava-gpu-worker'
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_scrape_token
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/gpu-workers.json
